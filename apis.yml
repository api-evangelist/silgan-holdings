aid: silgan-holdings
name: Silgan Holdings
description: >-
  Silgan Holdings Inc. is a leading global sustainable packaging provider for consumer
  goods products. The company partners with customers to deliver essential products to
  the world in efficient, sustainable, and cost-effective packaging formats. Silgan
  operates through three primary business segments: Dispensing and Specialty Closures,
  Metal Containers, and Custom Containers. With 123 manufacturing facilities on four
  continents, over 17,200 employees, and approximately $6 billion in annual sales,
  Silgan serves the food, beverage, healthcare, home and garden, personal care,
  fragrance, and beauty end markets.
